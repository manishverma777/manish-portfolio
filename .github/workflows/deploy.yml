name: Deploy portfolio to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Skip the Electron postinstall (native rebuild) — not needed for the web build.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build web
        run: npm run build:web

      # Publishes dist-web to the `gh-pages` branch using GITHUB_TOKEN.
      # Avoids the Pages "create/get site" API, so no admin API call is needed.
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist-web
          publish_branch: gh-pages
